<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뭘 만들어야 예쁘다고 해줄라나</title>

    <!-- css -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/jquery.fullPage.css">
    <link rel="stylesheet" href="./css/swiper-bundle.min.css">
    <link href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css" rel="stylesheet">
    <!-- js, swiper8.4.7 -->
    <script src="./js/jquery-3.7.0.min.js" defer></script>
    <script src="./js/swiper-bundle.min.js" defer></script>
    <script src="./js/jquery.fullPage.js" defer></script>
    <script src="./js/main.js" defer></script>
</head>
<body>
    <header>
        <div class="logo-area">
            SIK
        </div>
    </header>
    <div id="wrap">
        <div id="fullpage">

            <!-- section.intro -->
            <div class="section intro">
                <!-- intro bg -->
                <div class="bg-area">
                    <img src="./img/intro-bg.png" alt="background image">
                </div>
            </div>

            <!-- section.about -->
            <div class="section about">
                <!-- about bg -->
                <div class="bg-area">
                    <img src="./img/about-bg.svg" alt="background image">
                </div>
                <!-- about container -->
                <div class="container">
                    <!-- about-top -->
                    <div class="about-top-area">
                        <!-- left -->
                        <div class="left">
                            <div class="img-box box-sh">
                                <img src="./img/just-img.png" alt="">
                            </div>

                            <div class="sns-box box-sh">
                                <div class="bg-area">
                                    <img src="./img/sns-bg.svg" alt="">
                                </div>
                                <ul>
                                    <li>
                                        <a href="#">
                                            <img src="./img/sns-kakao.svg" alt="">
                                        </a>
                                    </li>
                                    <li>
                                        <a href="#">
                                            <img src="./img/sns-insta.svg" alt="">
                                        </a>
                                    </li>
                                    <li>
                                        <a href="#">
                                            <img src="./img/sns-github.svg" alt="">
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                        <!-- center -->
                        <div class="center">
                            <div class="time-weather-box box-sh">
                                <div id='time-weather-slider' class="swiper mySwiper">
                                    <div class="swiper-wrapper">
                                        <div class="swiper-slide">
                                            <div class="txt-box">
                                                <span class="sub-title">
                                                    July 25, 2023
                                                </span>
                                                <h2 id='timer' class="title">
                                                    <!-- 08:05:22 -->
                                                </h2>
                                            </div>
                                        </div>
                                        <div class="swiper-slide">
                                            <div class="txt-box">
                                                <span class="sub-title">
                                                    It's sunny
                                                </span>
                                                <h2 class="title">
                                                    8˚
                                                </h2>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="swiper-pagination"></div>
                                </div>
                            </div>
                            <div class="profile-box box-sh">
                                <div class="profile-img">
                                    <img src="./img/profile-img.jpg" alt="">
                                </div>
                                <div class="txt-box">
                                    <span class="name">김대식</span>
                                    <span class="job">
                                        Web Designer/ Web Publisher
                                    </span>
                                    <a href="#" class="pdf-btn">이력서 보기</a>
                                </div>
                            </div>
                        </div>
                        <!-- right -->
                        <div class="right">

                        </div>
                    </div>
                    <!-- about bottom -->
                    <div class="about-bottom-area">
                        bottom
                    </div>
                </div>
            </div>

            <div class="section">
                <h1>slide 3</h1>
            </div>

            <div class="section">
                <h1>slide 4</h1>
            </div>

        </div>
    </div>
</body>
</html>
