<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뭘 만들어야 예쁘다고 해줄라나</title>

    <!-- css -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/jquery.fullPage.css">

            </div>

            <!-- section.about -->
            <div class="section about">
                <!-- about bg -->
                <div class="bg-area">
                    <img src="./img/about-bg.svg" alt="background image">

                <!-- about container -->
                <div class="container">
                    <h2>ABOUT</h2>
                </div>
            </div>

            <div class="section">
                <h1>slide 3</h1>
